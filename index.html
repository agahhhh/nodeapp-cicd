<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Jokes Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: yellow;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        h1 {
            color: #333;
        }

        .joke {
            font-size: 1.2rem;
            margin: 25px 0;
            color: #555;
            min-height: 80px;
        }

        button {
            background: purple;
            color: pink;
            border: none;
            padding: 12px 24px;
            margin: 5px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #005fcc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Math Joke Generator</h1>

        <p id="joke" class="joke"></p>

        <button onclick="showRandomJoke()">New Joke</button>
        <br><br>
        <button onclick="window.location.href='calculator.html'">
            Calculator
        </button>
    </div>

    <script>
const jokes = [
    "Why was the equal sign so humble? Because it knew it wasn't less than or greater than anyone else!",
    "Why do plants hate math? Because it gives them square roots.",
    "Why was the math book sad? Because it had too many problems.",
    "Why didn't the quarter roll down the hill with the nickel? Because it had more cents.",
    "Why do mathematicians love parks? Because of all the natural logs.",
    "What do you call friends who love math? Alge-bros.",
    "Why was six afraid of seven? Because seven eight nine.",
    "What is a math teacher's favorite place in NYC? Times Square.",
    "Why did the student wear glasses in math class? To improve division.",
    "Parallel lines have so much in common. It's a shame they'll never meet."
];

const jokeElement = document.getElementById("joke");
const button = document.getElementById("newJokeBtn");

function showRandomJoke() {
    const randomIndex = Math.floor(Math.random() * jokes.length);
    jokeElement.textContent = jokes[randomIndex];
}

button.addEventListener("click", showRandomJoke);

// Show one immediately when page loads
showRandomJoke();
</script>
</body>
</html>
